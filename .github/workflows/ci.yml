name: CI for core + postgres

on:
  push:
    branches: [main, dev-test]

jobs:

  build-and-push:
    runs-on: ubuntu-24.04
    environment: prod
    strategy:
      matrix:
        service: [core, algorithm, grpc_proxy]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Создаём один buildx builder с docker-container
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true
          driver: docker-container
          use: true
          name: mybuilder
          buildkitd-flags: --debug

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: MoonliteSoda
          password: ${{ secrets.TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/piapav/${{ matrix.service }}_service:latest
          builder: mybuilder
          cache-from: type=registry,ref=ghcr.io/piapav/${{ matrix.service }}_service:latest
          cache-to: type=registry,mode=max,ref=ghcr.io/piapav/${{ matrix.service }}_service:cache

  deploy:
    runs-on: ubuntu-24.04
    environment: prod
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository (sparse)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            docker-compose.yml
            .env.example

      - name: Generate .env file
        run: |
          envsubst < .env.example > .env
        env:
          ACCESS_SECRET_KEY: ${{ secrets.ACCESS_SECRET_KEY }}
          REFRESH_SECRET_KEY: ${{ secrets.REFRESH_SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
          CORE_HOST: ${{ secrets.CORE_HOST }}
          CORE_PORT: ${{ secrets.CORE_PORT }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_ECHO: ${{ secrets.DB_ECHO }}
          MINIO_HOST: ${{ secrets.MINIO_HOST }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          S3_API_PORT: ${{ secrets.S3_API_PORT }}
          S3_CONSOLE_PORT: ${{ secrets.S3_CONSOLE_PORT }}
          BUCKET: ${{ secrets.BUCKET }}
          ACCESS_ID: ${{ secrets.ACCESS_ID }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          RabbitMQ_API_PORT: ${{ secrets.RabbitMQ_API_PORT }}
          RabbitMQ_CONSOLE_PORT: ${{ secrets.RabbitMQ_CONSOLE_PORT }}
          RabbitMQ_USER: ${{ secrets.RabbitMQ_USER }}
          RabbitMQ_PASSWORD: ${{ secrets.RabbitMQ_PASSWORD }}
          RABBIT_HOST: ${{ secrets.RABBIT_HOST }}
          RABBIT_QUEUE_TASKS: ${{ secrets.RABBIT_QUEUE_TASKS }}
          RABBIT_QUEUE_RESULTS: ${{ secrets.RABBIT_QUEUE_RESULTS }}
          RABBIT_EXCHANGE: ${{ secrets.RABBIT_EXCHANGE }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
          ID_KEY: ${{ secrets.ID_KEY }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          CORE_SERVICE_IMAGE: ${{ secrets.CORE_SERVICE_IMAGE }}
          RABBIT_IMAGE: ${{ secrets.RABBIT_IMAGE }}
          POSTGRES_IMAGE: ${{ secrets.POSTGRES_IMAGE }}
          S3_MINIO_IMAGE: ${{ secrets.S3_MINIO_IMAGE }}
          ALGORITHM_SERVICE_IMAGE: ${{ secrets.ALGORITHM_SERVICE_IMAGE }}
          REDIS_SERVICE_IMAGE: ${{ secrets.REDIS_SERVICE_IMAGE }}
          GRPC_PROXY_IMAGE: ghcr.io/piapav/grpc_proxy:latest
          GRPC_HOST: grpc_proxy
          GRPC_PORT: 50051

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/deploy
            cd ~/deploy
            rm -f docker-compose.yml .env

            # Copy files
            scp $GITHUB_WORKSPACE/docker-compose.yml . 
            scp $GITHUB_WORKSPACE/.env .

            # Clean old containers and images
            docker compose down --remove-orphans || true
            docker image rm -f ghcr.io/piapav/core_service:latest || true
            docker image rm -f ghcr.io/piapav/algorithm_service:latest || true
            docker image rm -f ghcr.io/piapav/grpc_proxy:latest || true

            # Login to GHCR
            echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u MoonliteSoda --password-stdin

            # Pull images
            docker pull ghcr.io/piapav/core_service:latest
            docker pull ghcr.io/piapav/algorithm_service:latest
            docker pull ghcr.io/piapav/grpc_proxy:latest
            docker pull ${{ secrets.POSTGRES_IMAGE }}
            docker pull ${{ secrets.S3_MINIO_IMAGE }}
            docker pull ${{ secrets.REDIS_SERVICE_IMAGE }}

            # Start containers
            docker compose --env-file .env up -d --scale algorithm-service=3
            docker compose ps
